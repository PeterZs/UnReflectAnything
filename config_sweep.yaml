### WANDB SWEEP CONFIG ###
method: grid
metric:
  goal: minimize
  name: Validation/epoch/Diffuse

program: sweep_agent.py

project: UnReflectAnything  
entity: unreflect-anything



parameters:

  ### MODEL ARCHITECTURE                                                       
  MODEL:
    value:
      MODEL_CLASS: "UnReflect_Model_TokenInpainter"
      RGB_ENCODER:
        ENCODER: "facebook/dinov3-vitl16-pretrain-lvd1689m"
        IMAGE_SIZE: 448
        RETURN_SELECTED_LAYERS: [3, 6, 9, 12]
      DECODERS:
        diffuse:
          USE_FILM: False
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [768,1024,1536,2048]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          FROM_PRETRAINED: "weights/rgb_decoder.pth"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 3
        # specular:
        #   FEATURE_DIM: 1024
        #   REASSEMBLE_OUT_CHANNELS: [384,768,1024,1536]
        #   REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
        #   READOUT_TYPE: "ignore"
        #   USE_BN: False
        #   OUTPUT_IMAGE_SIZE: [448,448]
        #   OUTPUT_CHANNELS: 4
        highlight:
          USE_FILM: False
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [384,768,1024,1536]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 1

  USE_TORCH_COMPILE:
    value: False

  ### DATA                                                                      
  DATASETS:
    value:
      SCRREAM:
        VAL_SCENES: ["scene10_full_00","scene11_full_00","scene044_full_00","scene04_reduced_00","scene04_reduced_01","scene04_reduced_02"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        FEW_IMAGES: True
        SAMPLE_EVERY_N: 4
        LOAD_RGB_ONLY: True
        
      HOUSECAT6D:
        VAL_SCENES: ["val_scene1","val_scene2"] #,"scene33","scene34"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        FEW_IMAGES: True
        SAMPLE_EVERY_N: 2
        LOAD_RGB_ONLY: True

      CROMO:
        TRAIN_SCENES: ["kitchen"]
        VAL_SCENES: "station"
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize"
        FEW_IMAGES: "true"
        SAMPLE_EVERY_N: 8
        LOAD_RGB_ONLY: True
    
      PSD:
        TRAIN_SCENES: "PSD_Train"
        VAL_SCENES: "PSD_Val"
        TARGET_SIZE: [448,448]  
        RESIZE_MODE: "resize+crop"
        FEW_IMAGES: "true"
        SAMPLE_EVERY_N: 1
        LOAD_RGB_ONLY: True

      SCARED:
        VAL_SCENES: ["v22","v23","v24","v25","v26","v27","v28","v29","v30","v31","v32","v33","v34"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 4
        LOAD_RGB_ONLY: True
        FEW_IMAGES: True
        HIGHLIGHT_ENABLE: False  
        HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
        HIGHLIGHT_RETURN_MASK: True
        HIGHLIGHT_RECT_SIZE: [1000, 1000]
        HIGHLIGHT_RETURN_RECT_AS_RGB: False
        HIGHLIGHT_RETURN_RECT: True
      
      STEREOMIS_TRACKING:
        VAL_SCENES: ["P2_2"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 10
        LOAD_RGB_ONLY: True
        FEW_IMAGES: True
        HIGHLIGHT_ENABLE: False  
        HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
        HIGHLIGHT_RETURN_MASK: True
        HIGHLIGHT_RECT_SIZE: [800, 800]
        HIGHLIGHT_RETURN_RECT_AS_RGB: False
        HIGHLIGHT_RETURN_RECT: True

      CHOLEC80:
        VAL_SCENES: ["val"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 50
        LOAD_RGB_ONLY: True
        FEW_IMAGES: True
        HIGHLIGHT_ENABLE: False  
        HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
        HIGHLIGHT_RETURN_MASK: True
        HIGHLIGHT_RECT_SIZE: [800, 800]
        HIGHLIGHT_RETURN_RECT_AS_RGB: False
        HIGHLIGHT_RETURN_RECT: True

      # POLARGB:
      #   TRAIN_SCENES: "train"
      #   VAL_SCENES: "test"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize+crop"
      #   SAMPLE_EVERY_N: 1
      #   LOAD_RGB_ONLY: True


  BATCH_SIZE: # Max batch size with img size 448 is 32
    value: 16
  NUM_WORKERS:
    value: 4
  SHUFFLE:
    value: True
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 2
  
  ### HIGHLIGHTS                                                        
  MOGE_MODEL:
    value: "Ruicheng/moge-2-vits-normal"
  SURFACE_ROUGHNESS:
    value: 8.0
  INTENSITY:
    value: 1.5
  # NORMAL_NOISE:
  #   value: 1
  # NORMAL_NOISE_CELLS:
  #   value: 8
  # NORMAL_NOISE_OCTAVES:
  #   value: 4
  # NORMAL_NOISE_FALLOFF:
  #   value: 4
  LIGHT_DISTANCE_RANGE:
    value: [0.0, 1]
  LIGHT_LEFT_RIGHT_ANGLE:
    value: [0, 360]
  LIGHT_ABOVE_BELOW_ANGLE:
    value: [0, 360]
  DATASET_HIGHLIGHT_DILATION:
    value: 51
  DATASET_HIGHLIGHT_THRESHOLD:
    value: 0.875

  ### OPTIMIZATION                                                                      
  LEARNING_RATE:
    values: [1.0e-4,1.0e-5,1.0e-6,1.0e-7,1.0e-8]
  WEIGHT_DECAY:
    value: 0.0
  EPOCHS:
    value: 100
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  WARMUP_STEPS:
    value: 2
  GRADIENT_CLIPPING_MAX_NORM:
    value: 8
  LR_SCHEDULER: 
    value: 
      ONPLATEAU:
        PATIENCE: 5
        FACTOR: 0.1
      # COSINE:
      #   N_PERIODS: 5
      STEPWISE:
        N_STEPS: 4
        GAMMA: 0.5
      # EXPONENTIAL:
      #   GAMMA: 0.5

  SWITCH_OPTIMIZER_EPOCH:
    value: null
  OPTIMIZER_BOOTSTRAP_NAME:
    value: "AdamW" 
  OPTIMIZER_REFINING_NAME:
    value: "AdamW"    
  EARLY_STOPPING_PATIENCE:
    value: 20
  SAVE_INTERVAL:
    value: 1000
  
  ### LOSS WEIGHTS (relative to the total loss, NOT NORMALIZED LATER)                                                                              
  SPECULAR_LOSS_WEIGHT:
    value: 0.0
  DIFFUSE_LOSS_WEIGHT:
    value: 0.0
  HIGHLIGHT_LOSS_WEIGHT:
    value: 0.0
  IMAGE_RECONSTRUCTION_LOSS_WEIGHT:
    value: 0.0
  SATURATION_RING_LOSS_WEIGHT:
    value: 0.0
  RING_KERNEL_SIZE:
    value: 11
  RING_VAR_WEIGHT:
    value: 0.5
  RING_TEXTURE_WEIGHT:
    value: 1.0
  
  ### LOSS PARAMETERS
  # Highlight regression loss parameters
  HLREG_W_L1:
    value: 1.0
  HLREG_USE_CHARB:
    value: True
  HLREG_W_DICE:
    value: 0.2
  HLREG_W_SSIM:
    value: 0.0
  HLREG_W_GRAD:
    value: 0.0
  HLREG_W_TV:
    value: 0.0  
  # Highlight regression stabilization (optional)
  HLREG_BALANCE_MODE:
    value: "auto"   # 'none' | 'auto' | 'pos_weight'
  HLREG_POS_WEIGHT:
    value: 1.0      # used only if BALANCE_MODE == 'pos_weight'
  HLREG_FOCAL_GAMMA:
    value: 2.0      # 0.0 keeps old behavior; try 1.0-2.0 if gradients vanish
  # Highlight rendering parameters
  HIGHLIGHT_COLOR:
    value: [1.0, 1.0, 1.0]
  CLAMP_RECONSTRUCTION:
    value: True
  
  # Context and regularization weights
  WEIGHT_CONTEXT_IDENTITY:
    value: 0.0
  WEIGHT_RING_GRAD:
    value: 0.0
  WEIGHT_TV_IN_HOLE:
    value: 0.00
  RING_DILATE_KERNEL:
    value: 15
  
  # Token-space loss parameters
  WEIGHT_TOKEN_INPAINT:
    value: 1.0
  TOKEN_FEAT_ALPHA:
    value: 1

  ### LOGGING, RESULTS AND WANDB                                                                 
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 1
  IMAGE_LOG_INTERVAL:
    value: 2
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 50
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  NOTES:
    value: "Proper token inpainting"
  