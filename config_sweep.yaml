### WANDB SWEEP CONFIG ###
method: grid
metric:
  goal: minimize
  name: Validation/epoch/Loss

program: sweep_agent.py

project: UnReflectAnything  


parameters:

  ABLATE: 
    values: [False, True]
    
  ### MODEL ARCHITECTURE                                                       
  MODEL:
    value:
      MODEL_CLASS: "RGBDistillDecomposer"
      RGB_ENCODER:
        ENCODER: "facebook/dinov3-vitb16-pretrain-lvd1689m"
        IMAGE_SIZE: 448
        RETURN_SELECTED_LAYERS: [3, 6, 9,12]
      POL_ENCODER:
        EMBED_DIM: 768
        DEPTH: 4
        N_HEADS: 12
        PATCH_SIZE: 16
      CROSS_ATTN:
        EMBED_DIM: 768
        N_HEADS: 12
        DROPOUT: 0.1  
        BI_DIRECTIONAL: False
      DECODERS:
        diffuse:
          FEATURE_DIM: 768
          REASSEMBLE_OUT_CHANNELS: [48,192,384,768]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 3
        specular:
          FEATURE_DIM: 768
          REASSEMBLE_OUT_CHANNELS: [48,192,384,768]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 4
        highlight:
          FEATURE_DIM: 768
          REASSEMBLE_OUT_CHANNELS: [48,192,384,768]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 1

  ### DATA                                                                      
  DATASETS:
    value:
      # SCRREAM:
      #   VAL_SCENES: ["scene09_full_00", "scene09_reduced_00"]
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize"
      #   FEW_IMAGES: False
      #   LOAD_RGB_ONLY: False
        
      # HOUSECAT6D:
      #   VAL_SCENES: "val"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "crop"
      #   FEW_IMAGES: False
      #   LOAD_RGB_ONLY: False

      # POLARGB:
      #   TRAIN_SCENES: "train"
      #   VAL_SCENES: "test"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize"
      #   LOAD_RGB_ONLY: False

      # CROMO:
      #   TRAIN_SCENES: "kitchen"
      #   VAL_SCENES: "test"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize"
      #   LOAD_RGB_ONLY: False

      SCARED:
        VAL_SCENES: ["v22","v23","v24","v25","v26","v27","v28","v29","v30","v31","v32","v33","v34"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize"
        LOAD_RGB_ONLY: True
        FEW_IMAGES: False
        HIGHLIGHT_ENABLE: False  
        HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
        HIGHLIGHT_RETURN_MASK: True
        HIGHLIGHT_RECT_SIZE: [640, 640]
        HIGHLIGHT_RETURN_RECT_AS_RGB: False
        HIGHLIGHT_RETURN_RECT: True

      # SYNTHETIC:
      #   TRAIN_SCENES: "bedroom"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize"
      #   HIGHLIGHT_ENABLE: False  
      #   HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.93
      #   HIGHLIGHT_RETURN_MASK: True
      #   HIGHLIGHT_RECT_SIZE: [640, 640]
      #   HIGHLIGHT_RETURN_RECT_AS_RGB: True
      #   HIGHLIGHT_RETURN_RECT: True
      #   LOAD_RGB_ONLY: False

  BATCH_SIZE: # Max batch size with img size 448 is 64
    value: 32
  NUM_WORKERS:
    value: 6
  SHUFFLE:
    value: True
  PIN_MEMORY:
    value: true
  PREFETCH_FACTOR:
    value: 2

  ### Knowledge Distillation                                                          
  DISTILLATION_ALPHA:
    value: 0.7
  DISTILLATION_TEMPERATURE:
    value: 4.0
  
  ### POLARIZATION / HIGHLIGHTS                                                        
  MOGE_MODEL:
    value: "Ruicheng/moge-2-vits-normal"
  SHININESS:
    value: 10
  KS:
    value: 2.0
  LIGHT_DISTANCE_RANGE:
    value: [0.04, 0.2]
  LIGHT_LEFT_RIGHT_ANGLE:
    value: [0, 360]
  LIGHT_ABOVE_BELOW_ANGLE:
    value: [0, 360]
  SOFT_HIGHLIGHT_THRESHOLD:
    value: 0.9
  REAL_HIGHLIGHT_DILATION:
    value: 15
  # Highlight regression stabilization (optional)
  HLREG_BALANCE_MODE:
    value: "auto"   # 'none' | 'auto' | 'pos_weight'
  HLREG_POS_WEIGHT:
    value: 1.0      # used only if BALANCE_MODE == 'pos_weight'
  HLREG_FOCAL_GAMMA:
    value: 2.0      # 0.0 keeps old behavior; try 1.0-2.0 if gradients vanish

  ### OPTIMIZATION                                                                      
  LEARNING_RATE:
    value: 5.0e-4
  WEIGHT_DECAY:
    value: 0.0
  EPOCHS:
    value: 40
  GRADIENT_ACCUMULATION_STEPS:
    value: 2
  WARMUP_STEPS:
    value: 200
  GRADIENT_CLIPPING_MAX_NORM:
    value: -1
  LR_SCHEDULER: 
    value: 
      ONPLATEAU:
        PATIENCE: 10
        FACTOR: 0.1
      COSINE:
        N_PERIODS: 20
      # STEPWISE:
      #   N_STEPS: 3
      #   GAMMA: 0.5
      # EXPONENTIAL:
      #   GAMMA: 0.5

  SWITCH_OPTIMIZER_EPOCH:
    value: null
  OPTIMIZER_BOOTSTRAP_NAME:
    value: "Adam"
  OPTIMIZER_REFINING_NAME:
    value: "Adam"
  EARLY_STOPPING_PATIENCE:
    value: 20
  SAVE_INTERVAL:
    value: 1000
  
  ### LOSS WEIGHTS (relative to the total loss, NOT NORMALIZED LATER)                                                                              
  SPECULAR_LOSS_WEIGHT:
    value: 1.0
  DIFFUSE_LOSS_WEIGHT:
    value: 1.0
  HIGHLIGHT_LOSS_WEIGHT:
    value: 1.0
  COMPONENT_MATCHING_LOSS_WEIGHT:
    value: 1.0
  IMAGE_RECONSTRUCTION_LOSS_WEIGHT:
    value: 0.0
  ALPHA_REGULARIZATION_LOSS_WEIGHT:
    value: 0.1
  SPATIAL_CONSISTENCY_LOSS_WEIGHT:
    value: 0.3

  ### LOGGING, RESULTS AND WANDB                                                                 
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 4
  IMAGE_LOG_INTERVAL:
    value: 5
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 50
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  NOTES:
    value: "Masking compositing operation"