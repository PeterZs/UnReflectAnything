### 8-AGENT RANDOM SWEEP — five hyperparameters identified as primary regression
### causes in the GOOD↔WORSE run analysis, swept around config/end2end.yaml:
###
###   SURFACE_ROUGHNESS           — highlight breadth  (#1 cause: sharp specks vs soft blobs)
###   INTENSITY                   — highlight strength (dim signal in WORSE runs)
###   HIGHLIGHT_LOSS_WEIGHT       — supervised vs frozen highlight head
###   WEIGHT_DIFFUSE_HIGHLIGHT_PENALTY — direct "no bright output pixels" signal
###   INPAINT_MASK_DILATION       — mask coverage around highlights
###
### Architecture (MODEL) is fixed at the stable GOOD-run recipe (DETACH=True,
### 1 fusion block, dropout=0.1, highlight head LR=5e-4). This isolates the
### highlight-distribution and loss choices from the architectural stability
### question — the latter is already settled by the analysis.
###
### Metric: Validation/PSNR/diffuse_inmask — in-mask metric that measures how
### well the model actually removes highlights (not gameable by identity).
###
### To launch (8 single-GPU agents, one config each):
###   SWEEP_ID=$(wandb sweep config/sweep.yaml 2>&1 | tail -1 | awk '{print $NF}')
###   for i in $(seq 8); do
###       CUDA_VISIBLE_DEVICES=$((i-1)) wandb agent --count 1 $SWEEP_ID &
###   done
###
### Or with SLURM: submit 8 jobs each running:
###   wandb agent --count 1 unreflect-anything/UnReflectAnything/<sweep-id>

method: random
run_cap: 8

metric:
  goal: maximize
  name: Validation/PSNR/diffuse_inmask

early_terminate:
  type: hyperband
  min_iter: 5
  eta: 2

program: sweep_agent.py
project: UnReflectAnything
entity: unreflect-anything

parameters:

  # ── SWEPT: the five parameters identified as regression causes ───────────────

  SURFACE_ROUGHNESS:
    # Highlight breadth. GOOD runs: roughness ~8 (broad soft blobs). WORSE runs: [80,2000]
    # (pinpoint specks → model only learns to erase tiny dots, fails on real broad highlights).
    # Sampled log-uniformly in _resolve_highlight_param when given as a [min, max] range.
    values:
      - [20.0, 200.0]    # concentrated in perceptually realistic range
      - [20.0, 2000.0]   # full log-uniform range (includes sharp specks)

  INTENSITY:
    # Highlight strength. GOOD runs: 1.5–2.0. WORSE runs: [0.5,1.0] — too dim, the
    # model sees weak gradients and doesn't learn to suppress bright highlights in output.
    values:
      - [0.5, 1.0]   # dim — end2end.yaml / WORSE recipe
      - [1.0, 2.0]   # strong — GOOD-run range

  HIGHLIGHT_LOSS_WEIGHT:
    # Supervises the highlight-mask head that feeds the token inpainter. WORSE runs
    # (cerulean, unique-sponge) set this to 0 AND froze the head (DECODER_LR=0),
    # giving ~15× worse HighlightRegression vs GOOD runs. Here MODEL fixes the head
    # LR at 5e-4; this weight controls whether the mask-regression loss is active.
    values:
      - 1.0   # supervised (GOOD-run recipe)
      - 0.0   # no mask loss (end2end.yaml recipe)

  WEIGHT_DIFFUSE_HIGHLIGHT_PENALTY:
    # Direct penalty on residual bright pixels in the diffuse output. snowy-glade
    # (best removal) used 1.0; end2end.yaml used 0.05 — 20× weaker, so the model
    # was rarely penalised for leaving highlights behind.
    # Sampled log-uniformly so low values (like 0.05) are as likely as high ones (2.0).
    distribution: log_uniform_values
    min: 0.05
    max: 2.0

  INPAINT_MASK_DILATION:
    # Dilation of the highlight mask before feeding the token inpainter. Too small (9)
    # leaves bright fringes at highlight edges; GOOD runs used 15–17 to cover the halo.
    values:
      - 9    # end2end.yaml — too tight
      - 15   # optimal from analysis
      - 21   # aggressive halo coverage

  # ── FIXED: stable architecture (GOOD-run recipe) ─────────────────────────────
  # Architecture is fixed at the GOOD-run stable recipe to isolate the effect of the
  # five swept parameters above. Key stability knobs vs end2end.yaml:
  #   DETACH=True (end2end: False → NaN-gradient coupling)
  #   NUM_FUSION_BLOCKS_TRAINABLE=1 (end2end: 4 → overfit/instability)
  #   DROPOUT=0.1 (end2end: 0.0)
  #   highlight DECODER_LR=5e-4 (end2end: 0.0 → frozen head)

  MODEL:
    value:
      MODEL_CLASS: "UnReflect_Model_TokenInpainter"
      MODEL_MODULE: "models"
      DETACH_INPAINTED_TOKENS_FOR_DECODER: True
      RGB_ENCODER:
        ENCODER: "facebook/dinov3-vitl16-pretrain-lvd1689m"
        IMAGE_SIZE: 896
        RETURN_SELECTED_LAYERS: [3, 6, 9, 12]
        RGB_ENCODER_LR: 0.0
      DECODERS:
        diffuse:
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [768,1024,1536,2048]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          FROM_PRETRAINED: "diffuse_decoder.pt"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [896,896]
          OUTPUT_CHANNELS: 3
          DECODER_LR: 1.0e-4
          NUM_FUSION_BLOCKS_TRAINABLE: 1
          TRAIN_RGB_HEAD: True
        highlight:
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [96,192,384,768]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          FROM_PRETRAINED: "highlight_decoder.pt"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [896,896]
          OUTPUT_CHANNELS: 1
          DECODER_LR: 5.0e-4
          NUM_FUSION_BLOCKS_TRAINABLE: null
      TOKEN_INPAINTER:
        TOKEN_INPAINTER_CLASS: "TokenInpainter_Prior"
        TOKEN_INPAINTER_MODULE: "token_inpainters"
        TOKEN_INPAINTER_LR: 1.0e-4
        DEPTH: 6
        HEADS: 16
        DROP: 0.05
        USE_POSITIONAL_ENCODING: True
        USE_FINAL_NORM: True
        USE_LOCAL_PRIOR: True
        LOCAL_PRIOR_WEIGHT: 0.4
        LOCAL_PRIOR_KERNEL: 5
        SEED_NOISE_STD: 0.02

  INPAINT_MASK_THRESHOLD:
    value: 0.3

  INPAINT_FEED_RAW_MASK:
    value: False

  USE_TORCH_COMPILE:
    value: False
  DISTRIBUTE:
    value: "singlegpu"

  ### DATA
  DATASETS:
    value:
      SCRREAM:
        VAL_SCENES: ["scene10", "scene04"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 6
      HOUSECAT6D:
        VAL_SCENES: ["val_scene1","val_scene2"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 4
      CROMO:
        TRAIN_SCENES: ["kitchen"]
        VAL_SCENES: ["station"]
        RESIZE_MODE: "resize"
        SAMPLE_EVERY_N: 30
      PSD:
        TRAIN_SCENES: "PSD_Train"
        VAL_SCENES: "PSD_Val"
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 1
      SCARED:
        VAL_SCENES: ["v22","v23","v24","v25","v26","v27","v28","v29","v30","v31","v32","v33","v34"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 8
      STEREOMIS_TRACKING:
        VAL_SCENES: ["P2_2"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 2
      CHOLEC80:
        TRAIN_SCENES: ["train"]
        VAL_SCENES: ["test"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 40
      SUNRGBD:
        VAL_SCENES: ["realsense"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 4
      OPENIMAGESV7:
        TRAIN_SCENES: ["thescene"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 5
      ENDOSYNTH:
        TRAIN_SCENES: ["scene"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 1
      ALL_DATASETS:
        FEW_IMAGES: False
        TARGET_SIZE: [896,896]
        LOAD_RGB_ONLY: True

  BATCH_SIZE:
    value: 6
  NUM_WORKERS:
    value: 12
  SHUFFLE:
    value: True
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 2

  ### HIGHLIGHTS (fixed except SURFACE_ROUGHNESS and INTENSITY which are swept)
  MOGE_MODEL:
    value: "Ruicheng/moge-2-vits-normal"
  LIGHT_DISTANCE_RANGE:
    value: [0.0, 1]
  LIGHT_LEFT_RIGHT_ANGLE:
    value: [0, 360]
  LIGHT_ABOVE_BELOW_ANGLE:
    value: [0, 360]
  DATASET_HIGHLIGHT_DILATION:
    value: 25
  DATASET_HIGHLIGHT_THRESHOLD:
    value: 0.85
  DATASET_HIGHLIGHT_USE_LUMINANCE:
    value: True
  HIGHLIGHT_COLOR:
    value: [1.0, 1.0, 1.0]
  CLAMP_RECONSTRUCTION:
    value: True

  ### OPTIMIZATION
  LEARNING_RATE:
    value: 1.0e-3
  WEIGHT_DECAY:
    value: 0.0
  EPOCHS:
    value: 30
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  WARMUP:
    value: 400
  GRADIENT_CLIPPING_MAX_NORM:
    value: 8
  LR_SCHEDULER:
    value:
      ONPLATEAU:
        PATIENCE: 5
        FACTOR: 0.1
      STEPWISE:
        GAMMA: 0.5
        N_STEPS: 4

  REAPPLY_LRS_ON_RESUME:
    value: True

  OPTIMIZER_BOOTSTRAP_NAME:
    value: "AdamW"
  EARLY_STOPPING_PATIENCE:
    value: 15
  SAVE_INTERVAL:
    value: 1000

  DATASET_HIGHLIGHT_SUPERVISION_THRESHOLD:
    value: 0.1

  ### LOSS WEIGHTS (HIGHLIGHT_LOSS_WEIGHT is swept above)
  SPECULAR_LOSS_WEIGHT:
    value: 0.0
  DIFFUSE_LOSS_WEIGHT:
    value: 1.0
  TOKEN_INPAINT_LOSS_WEIGHT:
    value: 1.0
  IMAGE_RECONSTRUCTION_LOSS_WEIGHT:
    value: 0.0

  HLREG_W_L1:
    value: 1.0
  HLREG_USE_CHARB:
    value: True
  HLREG_W_DICE:
    value: 0.2
  HLREG_W_SSIM:
    value: 0.0
  HLREG_W_GRAD:
    value: 0.0
  HLREG_W_TV:
    value: 0.0
  HLREG_BALANCE_MODE:
    value: "auto"
  HLREG_POS_WEIGHT:
    value: 1.0
  HLREG_FOCAL_GAMMA:
    value: 2.0

  WEIGHT_SEAM:
    value: 0.5
  RING_DILATE_KERNEL:
    value: 17
  SEAM_USE_CHARB:
    value: True
  SEAM_WEIGHT_GRAD:
    value: 0.0
  TOKEN_FEAT_ALPHA:
    value: 0.5

  ### DIFFUSE HIGHLIGHT PENALTY (WEIGHT_DIFFUSE_HIGHLIGHT_PENALTY is swept above)
  DIFFUSE_HL_THRESHOLD:
    value: 0.85
  DIFFUSE_HL_USE_CHARB:
    value: True
  DIFFUSE_HL_PENALTY_MODE:
    value: "brightness"
  DIFFUSE_HL_TARGET_BRIGHTNESS:
    value: null
  DIFFUSE_HL_USE_LUMINANCE:
    value: False

  ### LOGGING
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 1
  IMAGE_LOG_INTERVAL:
    value: 5
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 50
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  NOTES:
    value: "sweep: roughness × intensity × hl-loss × hl-penalty × mask-dilation"
