### 8-AGENT GRID SWEEP — three binary axes implicated in the GOOD↔WORSE regression
### centred on config/end2end.yaml:
###
###   (1) MODEL   — stable (GOOD-run recipe)     vs  aggressive (end2end.yaml recipe)
###   (2) SURFACE_ROUGHNESS — [20,200] broad-only vs  [20,2000] full log-uniform range
###   (3) HIGHLIGHT_LOSS_WEIGHT — 1.0 supervised head vs 0.0 frozen head
###
### 2 × 2 × 2 = 8 exact grid runs. All other params fixed at the optimal values
### established from the run analysis (broad highlights, strong penalty, stable mask dilation).
###
### To launch:
###   wandb sweep config/sweep.yaml          # prints sweep ID
###   wandb agent unreflect-anything/UnReflectAnything/<sweep-id>   # ×8 on 8 separate GPUs
###
### Each agent runs a single training process (DISTRIBUTE: singlegpu).
### For multi-GPU-per-agent runs, replace with:
###   torchrun --nproc_per_node=N sweep_agent.py

method: grid
metric:
  goal: maximize
  name: Validation/PSNR/diffuse_inmask

program: sweep_agent.py

project: UnReflectAnything
entity: unreflect-anything

parameters:

  # ── SWEPT DIMENSIONS (3 binary → 8 combinations) ────────────────────────────

  MODEL:
    values:
      - # stable — GOOD-run architecture (DETACH, low LR, 1 fusion block, supervised highlight head)
        MODEL_CLASS: "UnReflect_Model_TokenInpainter"
        MODEL_MODULE: "models"
        DETACH_INPAINTED_TOKENS_FOR_DECODER: True
        RGB_ENCODER:
          ENCODER: "facebook/dinov3-vitl16-pretrain-lvd1689m"
          IMAGE_SIZE: 896
          RETURN_SELECTED_LAYERS: [3, 6, 9, 12]
          RGB_ENCODER_LR: 0.0
        DECODERS:
          diffuse:
            FEATURE_DIM: 1024
            REASSEMBLE_OUT_CHANNELS: [768,1024,1536,2048]
            REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
            READOUT_TYPE: "ignore"
            FROM_PRETRAINED: "diffuse_decoder.pt"
            USE_BN: False
            DROPOUT: 0.1
            OUTPUT_IMAGE_SIZE: [896,896]
            OUTPUT_CHANNELS: 3
            DECODER_LR: 1.0e-4
            NUM_FUSION_BLOCKS_TRAINABLE: 1
            TRAIN_RGB_HEAD: True
          highlight:
            FEATURE_DIM: 1024
            REASSEMBLE_OUT_CHANNELS: [96,192,384,768]
            REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
            READOUT_TYPE: "ignore"
            FROM_PRETRAINED: "highlight_decoder.pt"
            USE_BN: False
            DROPOUT: 0.1
            OUTPUT_IMAGE_SIZE: [896,896]
            OUTPUT_CHANNELS: 1
            DECODER_LR: 5.0e-4
            NUM_FUSION_BLOCKS_TRAINABLE: null
        TOKEN_INPAINTER:
          TOKEN_INPAINTER_CLASS: "TokenInpainter_Prior"
          TOKEN_INPAINTER_MODULE: "token_inpainters"
          TOKEN_INPAINTER_LR: 1.0e-4
          DEPTH: 6
          HEADS: 16
          DROP: 0.05
          USE_POSITIONAL_ENCODING: True
          USE_FINAL_NORM: True
          USE_LOCAL_PRIOR: True
          LOCAL_PRIOR_WEIGHT: 0.4
          LOCAL_PRIOR_KERNEL: 5
          SEED_NOISE_STD: 0.02
      - # aggressive — end2end.yaml architecture (no detach, higher LR, 4 fusion blocks, frozen highlight head)
        MODEL_CLASS: "UnReflect_Model_TokenInpainter"
        MODEL_MODULE: "models"
        DETACH_INPAINTED_TOKENS_FOR_DECODER: False
        RGB_ENCODER:
          ENCODER: "facebook/dinov3-vitl16-pretrain-lvd1689m"
          IMAGE_SIZE: 896
          RETURN_SELECTED_LAYERS: [3, 6, 9, 12]
          RGB_ENCODER_LR: 0.0
        DECODERS:
          diffuse:
            FEATURE_DIM: 1024
            REASSEMBLE_OUT_CHANNELS: [768,1024,1536,2048]
            REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
            READOUT_TYPE: "ignore"
            FROM_PRETRAINED: "diffuse_decoder.pt"
            USE_BN: False
            DROPOUT: 0.0
            OUTPUT_IMAGE_SIZE: [896,896]
            OUTPUT_CHANNELS: 3
            DECODER_LR: 2.0e-4
            NUM_FUSION_BLOCKS_TRAINABLE: 4
            TRAIN_RGB_HEAD: True
          highlight:
            FEATURE_DIM: 1024
            REASSEMBLE_OUT_CHANNELS: [96,192,384,768]
            REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
            READOUT_TYPE: "ignore"
            FROM_PRETRAINED: "highlight_decoder.pt"
            USE_BN: False
            DROPOUT: 0.1
            OUTPUT_IMAGE_SIZE: [896,896]
            OUTPUT_CHANNELS: 1
            DECODER_LR: 0.0
            NUM_FUSION_BLOCKS_TRAINABLE: null
        TOKEN_INPAINTER:
          TOKEN_INPAINTER_CLASS: "TokenInpainter_Prior"
          TOKEN_INPAINTER_MODULE: "token_inpainters"
          TOKEN_INPAINTER_LR: 1.0e-4
          DEPTH: 6
          HEADS: 16
          DROP: 0.00
          USE_POSITIONAL_ENCODING: True
          USE_FINAL_NORM: True
          USE_LOCAL_PRIOR: True
          LOCAL_PRIOR_WEIGHT: 0.4
          LOCAL_PRIOR_KERNEL: 5
          SEED_NOISE_STD: 0.02

  SURFACE_ROUGHNESS:
    values:
      - [20.0, 200.0]   # narrow-broad: concentrates in the perceptually realistic range
      - [20.0, 2000.0]  # full range: log-uniform from soft blobs to sharp specks

  HIGHLIGHT_LOSS_WEIGHT:
    values:
      - 1.0   # supervised: highlight head receives mask-regression gradient
      - 0.0   # frozen-loss: no mask supervision (end2end.yaml recipe)

  # ── FIXED PARAMETERS (same for all 8 runs) ──────────────────────────────────

  INPAINT_MASK_THRESHOLD:
    value: 0.3
  INPAINT_MASK_DILATION:
    value: 15

  INPAINT_FEED_RAW_MASK:
    value: False

  USE_TORCH_COMPILE:
    value: False
  DISTRIBUTE:
    value: "singlegpu"

  ### DATA
  DATASETS:
    value:
      SCRREAM:
        VAL_SCENES: ["scene10", "scene04"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 6
      HOUSECAT6D:
        VAL_SCENES: ["val_scene1","val_scene2"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 4
      CROMO:
        TRAIN_SCENES: ["kitchen"]
        VAL_SCENES: ["station"]
        RESIZE_MODE: "resize"
        SAMPLE_EVERY_N: 30
      PSD:
        TRAIN_SCENES: "PSD_Train"
        VAL_SCENES: "PSD_Val"
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 1
      SCARED:
        VAL_SCENES: ["v22","v23","v24","v25","v26","v27","v28","v29","v30","v31","v32","v33","v34"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 8
      STEREOMIS_TRACKING:
        VAL_SCENES: ["P2_2"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 2
      CHOLEC80:
        TRAIN_SCENES: ["train"]
        VAL_SCENES: ["test"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 40
      SUNRGBD:
        VAL_SCENES: ["realsense"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 4
      OPENIMAGESV7:
        TRAIN_SCENES: ["thescene"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 5
      ENDOSYNTH:
        TRAIN_SCENES: ["scene"]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 1
      ALL_DATASETS:
        FEW_IMAGES: False
        TARGET_SIZE: [896,896]
        LOAD_RGB_ONLY: True

  BATCH_SIZE:
    value: 6
  NUM_WORKERS:
    value: 12
  SHUFFLE:
    value: True
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 2

  ### HIGHLIGHTS (fixed — only roughness and loss weight are swept)
  MOGE_MODEL:
    value: "Ruicheng/moge-2-vits-normal"
  INTENSITY:
    value: [1.0, 2.0]
  LIGHT_DISTANCE_RANGE:
    value: [0.0, 1]
  LIGHT_LEFT_RIGHT_ANGLE:
    value: [0, 360]
  LIGHT_ABOVE_BELOW_ANGLE:
    value: [0, 360]
  DATASET_HIGHLIGHT_DILATION:
    value: 25
  DATASET_HIGHLIGHT_THRESHOLD:
    value: 0.85
  DATASET_HIGHLIGHT_USE_LUMINANCE:
    value: True
  HIGHLIGHT_COLOR:
    value: [1.0, 1.0, 1.0]
  CLAMP_RECONSTRUCTION:
    value: True

  ### OPTIMIZATION
  LEARNING_RATE:
    value: 1.0e-3
  WEIGHT_DECAY:
    value: 0.0
  EPOCHS:
    value: 30
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  WARMUP:
    value: 400
  GRADIENT_CLIPPING_MAX_NORM:
    value: 8
  LR_SCHEDULER:
    value:
      ONPLATEAU:
        PATIENCE: 5
        FACTOR: 0.1
      STEPWISE:
        GAMMA: 0.5
        N_STEPS: 4

  REAPPLY_LRS_ON_RESUME:
    value: True

  OPTIMIZER_BOOTSTRAP_NAME:
    value: "AdamW"
  EARLY_STOPPING_PATIENCE:
    value: 15
  SAVE_INTERVAL:
    value: 1000

  DATASET_HIGHLIGHT_SUPERVISION_THRESHOLD:
    value: 0.1

  ### LOSS WEIGHTS (HIGHLIGHT_LOSS_WEIGHT is swept above)
  SPECULAR_LOSS_WEIGHT:
    value: 0.0
  DIFFUSE_LOSS_WEIGHT:
    value: 1.0
  TOKEN_INPAINT_LOSS_WEIGHT:
    value: 1.0
  IMAGE_RECONSTRUCTION_LOSS_WEIGHT:
    value: 0.0

  HLREG_W_L1:
    value: 1.0
  HLREG_USE_CHARB:
    value: True
  HLREG_W_DICE:
    value: 0.2
  HLREG_W_SSIM:
    value: 0.0
  HLREG_W_GRAD:
    value: 0.0
  HLREG_W_TV:
    value: 0.0
  HLREG_BALANCE_MODE:
    value: "auto"
  HLREG_POS_WEIGHT:
    value: 1.0
  HLREG_FOCAL_GAMMA:
    value: 2.0

  WEIGHT_SEAM:
    value: 0.5
  RING_DILATE_KERNEL:
    value: 17
  SEAM_USE_CHARB:
    value: True
  SEAM_WEIGHT_GRAD:
    value: 0.0
  TOKEN_FEAT_ALPHA:
    value: 0.5

  ### DIFFUSE HIGHLIGHT PENALTY
  WEIGHT_DIFFUSE_HIGHLIGHT_PENALTY:
    value: 1.0
  DIFFUSE_HL_THRESHOLD:
    value: 0.85
  DIFFUSE_HL_USE_CHARB:
    value: True
  DIFFUSE_HL_PENALTY_MODE:
    value: "brightness"
  DIFFUSE_HL_TARGET_BRIGHTNESS:
    value: null
  DIFFUSE_HL_USE_LUMINANCE:
    value: False

  ### LOGGING
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 1
  IMAGE_LOG_INTERVAL:
    value: 5
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 50
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  NOTES:
    value: "sweep: model-recipe × roughness-range × highlight-loss-weight"
