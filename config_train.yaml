
parameters:

  ### MODEL ARCHITECTURE                                                       
  MODEL:
    value:
      MODEL_CLASS: "RGBDistillDecomposer"
      RGB_ENCODER:
        ENCODER: "facebook/dinov3-vitl16-pretrain-lvd1689m"
        IMAGE_SIZE: 448
        RETURN_SELECTED_LAYERS: [3, 6, 9,12]
      DECODERS:
        diffuse:
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [192,384,768,1024]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 3
        specular:
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [192,384,768,1024]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 4
        highlight:
          FEATURE_DIM: 1024
          REASSEMBLE_OUT_CHANNELS: [192,384,768,1024]
          REASSEMBLE_FACTORS: [4.0, 2.0, 1.0, 0.5]
          READOUT_TYPE: "ignore"
          USE_BN: False
          DROPOUT: 0.1
          OUTPUT_IMAGE_SIZE: [448,448]
          OUTPUT_CHANNELS: 1

  USE_TORCH_COMPILE:
    value: True

  ### DATA                                                                      
  DATASETS:
    value:
      SCRREAM:
        VAL_SCENES: ["scene09_full_00", "scene09_reduced_00"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        FEW_IMAGES: False
        SAMPLE_EVERY_N: 4
        LOAD_RGB_ONLY: False
        
      HOUSECAT6D:
        VAL_SCENES: ["val_scene1","val_scene2"] #,"scene33","scene34"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        FEW_IMAGES: False
        SAMPLE_EVERY_N: 4
        LOAD_RGB_ONLY: False

      # POLARGB:
      #   TRAIN_SCENES: "train"
      #   VAL_SCENES: "test"
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize+crop"
      #   SAMPLE_EVERY_N: 1
      #   LOAD_RGB_ONLY: False

      CROMO:
        VAL_SCENES: ["park","facades"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize"
        SAMPLE_EVERY_N: 4
        LOAD_RGB_ONLY: False
    
      # PSD:
      #   TRAIN_SCENES: "PSD_Train"
      #   VAL_SCENES: "PSD_Val"
      #   TARGET_SIZE: [448,448]  
      #   RESIZE_MODE: "resize+crop"
      #   SAMPLE_EVERY_N: 1
      #   LOAD_RGB_ONLY: False

      # SCARED:
      #   VAL_SCENES: ["v22","v23","v24","v25","v26","v27","v28","v29","v30","v31","v32","v33","v34"]
      #   # TRAIN_SCENES: ["---"]
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize+crop"
      #   SAMPLE_EVERY_N: 20
      #   LOAD_RGB_ONLY: True
      #   FEW_IMAGES: False
      #   HIGHLIGHT_ENABLE: False  
      #   HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
      #   HIGHLIGHT_RETURN_MASK: True
      #   HIGHLIGHT_RECT_SIZE: [1000, 1000]
      #   HIGHLIGHT_RETURN_RECT_AS_RGB: False
      #   HIGHLIGHT_RETURN_RECT: True
      
      STEREOMIS_TRACKING:
        VAL_SCENES: ["P2_2"]
        TRAIN_SCENES: ["----"]
        TARGET_SIZE: [448,448]
        RESIZE_MODE: "resize+crop"
        SAMPLE_EVERY_N: 10
        LOAD_RGB_ONLY: True
        FEW_IMAGES: False
        HIGHLIGHT_ENABLE: False  
        HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
        HIGHLIGHT_RETURN_MASK: True
        HIGHLIGHT_RECT_SIZE: [800, 800]
        HIGHLIGHT_RETURN_RECT_AS_RGB: False
        HIGHLIGHT_RETURN_RECT: True

      # CHOLEC80:
      #   VAL_SCENES: ["val"]
      #   TARGET_SIZE: [448,448]
      #   RESIZE_MODE: "resize+crop"
      #   SAMPLE_EVERY_N: 50
      #   LOAD_RGB_ONLY: True
      #   FEW_IMAGES: False
      #   HIGHLIGHT_ENABLE: False  
      #   HIGHLIGHT_BRIGHTNESS_THRESHOLD: 0.9
      #   HIGHLIGHT_RETURN_MASK: True
      #   HIGHLIGHT_RECT_SIZE: [800, 800]
      #   HIGHLIGHT_RETURN_RECT_AS_RGB: False
      #   HIGHLIGHT_RETURN_RECT: True

  BATCH_SIZE: # Max batch size with img size 448 is 32
    value: 32
  NUM_WORKERS:
    value: 2
  SHUFFLE:
    value: True
  PIN_MEMORY:
    value: True
  PREFETCH_FACTOR:
    value: 1
  
  ### HIGHLIGHTS                                                        
  MOGE_MODEL:
    value: "Ruicheng/moge-2-vits-normal"
  SURFACE_ROUGHNESS:
    value: 8.0
  INTENSITY:
    value: 2.0
  # NORMAL_NOISE:
  #   value: 1
  # NORMAL_NOISE_CELLS:
  #   value: 8
  # NORMAL_NOISE_OCTAVES:
  #   value: 4
  # NORMAL_NOISE_FALLOFF:
  #   value: 4
  LIGHT_DISTANCE_RANGE:
    value: [0.0, 0.5]
  LIGHT_LEFT_RIGHT_ANGLE:
    value: [0, 360]
  LIGHT_ABOVE_BELOW_ANGLE:
    value: [0, 360]
  SOFT_HIGHLIGHT_THRESHOLD:
    value: 0.85
  REAL_HIGHLIGHT_DILATION:
    value: 11
  # Highlight regression stabilization (optional)
  HLREG_BALANCE_MODE:
    value: "auto"   # 'none' | 'auto' | 'pos_weight'
  HLREG_POS_WEIGHT:
    value: 1.0      # used only if BALANCE_MODE == 'pos_weight'
  HLREG_FOCAL_GAMMA:
    value: 2.0      # 0.0 keeps old behavior; try 1.0-2.0 if gradients vanish

  ### OPTIMIZATION                                                                      
  LEARNING_RATE:
    value: 1.0e-3
  WEIGHT_DECAY:
    value: 1.0e-8
  EPOCHS:
    value: 100
  GRADIENT_ACCUMULATION_STEPS:
    value: 1
  WARMUP_STEPS:
    value: 100
  GRADIENT_CLIPPING_MAX_NORM:
    value: -1
  LR_SCHEDULER: 
    value: 
      ONPLATEAU:
        PATIENCE: 5
        FACTOR: 0.1
      # COSINE:
      #   N_PERIODS: 5
      STEPWISE:
        N_STEPS: 3
        GAMMA: 0.5
      # EXPONENTIAL:
      #   GAMMA: 0.5

  SWITCH_OPTIMIZER_EPOCH:
    value: null
  OPTIMIZER_BOOTSTRAP_NAME:
    value: "Adam"
  OPTIMIZER_REFINING_NAME:
    value: "Adam"
  EARLY_STOPPING_PATIENCE:
    value: 20
  SAVE_INTERVAL:
    value: 1000
  
  ### LOSS WEIGHTS (relative to the total loss, NOT NORMALIZED LATER)                                                                              
  SPECULAR_LOSS_WEIGHT:
    value: 1.0
  DIFFUSE_LOSS_WEIGHT:
    value: 1.0
  HIGHLIGHT_LOSS_WEIGHT:
    value: 1.0
  IMAGE_RECONSTRUCTION_LOSS_WEIGHT:
    value: 1.0
  SATURATION_RING_LOSS_WEIGHT:
    value: 0.5
  RING_KERNEL_SIZE:
    value: 21
  RING_VAR_WEIGHT:
    value: 0.5
  RING_TEXTURE_WEIGHT:
    value: 1.0

  ### LOGGING, RESULTS AND WANDB                                                                 
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 4
  IMAGE_LOG_INTERVAL:
    value: 5
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 50
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  NOTES:
    value: "Large polarization-grounded pretrain. Small surgical data in val"
  