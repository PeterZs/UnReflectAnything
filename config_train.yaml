parameters:
  # Dataset configuration
  DATASETS:
    value:
      SCRREAM:
        ROOT_DIR: "/datasets/SCRREAM/"
        TRAIN_SCENES: []
        POLARIZATION_FORMAT: "single_file_clock"
        VAL_SCENES: ["scene09_full_00", "scene09_reduced_00"]
        RHO_S: 0.6
        EPS: 1.0e-8
        TARGET_SIZE: [224,224]
        RESIZE_MODE: "crop"
        USE_CACHE: True
        SIMPLIFY_UPSAMPLING: True
        FEW_IMAGES: False
        
      HOUSECAT6D:
        ROOT_DIR: "/datasets/HouseCat6D/"
        TRAIN_SCENES: []
        POLARIZATION_FORMAT: "single_file_clock"
        VAL_SCENES: "val"
        RHO_S: 0.6
        EPS: 1.0e-8
        TARGET_SIZE: [224,224]
        RESIZE_MODE: "crop"
        USE_CACHE: True
        SIMPLIFY_UPSAMPLING: True
        FEW_IMAGES: False

      POLARGB:
        ROOT_DIR: "/datasets/PolaRGB/"
        TRAIN_SCENES: "train"
        POLARIZATION_FORMAT: "separate_files"
        VAL_SCENES: "test"
        RHO_S: 0.6
        EPS: 1.0e-8
        TARGET_SIZE: [224,224]
        RESIZE_MODE: "crop"
        USE_CACHE: True
        SIMPLIFY_UPSAMPLING: True
        FEW_IMAGES: False
  
  # Training configuration
  BATCH_SIZE:
    value: 20
  WORKERS:
    value: 4
  PIN_MEMORY:
    value: true
  PREFETCH_FACTOR:
    value: 2
  
  # Model configuration
  LEARNING_RATE:
    value: 1.0e-4
  WEIGHT_DECAY:
    value: 1.0e-6
  EPOCHS:
    value: 100
  
  # Scheduler configuration
  STEPWISESCHEDULER_NSTEPS:
    value: 4
  STEPWISESCHEDULER_GAMMA:
    value: 0.5
  
  # Early stopping and checkpointing
  EARLY_STOPPING_PATIENCE:
    value: 20
  SAVE_INTERVAL:
    value: 10
  
  # Logging configuration
  LOG_INTERVAL:
    value: 1
  WANDB_LOG_INTERVAL:
    value: 4
  IMAGE_LOG_INTERVAL:
    value: 20
  NO_WANDB:
    value: False
  MODEL_WATCHER_FREQ_WANDB:
    value: 100
  WANDB_ENTITY:
    value: "unreflect-anything"
  WANDB_PROJECT:
    value: "UnReflectAnything"
  # Gradient accumulation and warmup
  GRADIENT_ACCUMULATION_STEPS:
    value: 2
  WARMUP_STEPS:
    value: 0
  
  LR_SCHEDULER:
    value: "stepwise"
  ONPLATEAUSCHEDULER_PATIENCE:
    value: 10
  ONPLATEAUSCHEDULER_FACTOR:
    value: 0.1
  EXPONENTIALSCHEDULER_GAMMA:
    value: 0.5
  STEPWISESCHEDULER_NSTEPS:
    value: 2

  # Optimizer switching (optional)
  SWITCH_OPTIMIZER_EPOCH:
    value: null
  OPTIMIZER_BOOTSTRAP_NAME:
    value: "Adam"
  OPTIMIZER_REFINING_NAME:
    value: "Adam"
  
  # Notes for this run
  NOTES:
    value: ""
  


